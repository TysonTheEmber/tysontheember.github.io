name: Update Download Counts

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-downloads:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch download counts
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: |
          # Fetch CurseForge downloads with error handling
          CURSEFORGE_RESPONSE=$(curl -s -w "\n%{http_code}" -H "x-api-key: $CURSEFORGE_API_KEY" \
            'https://api.curseforge.com/v1/mods/search?gameId=432&authorId=103107110&pageSize=50')
          CURSEFORGE_HTTP_CODE=$(echo "$CURSEFORGE_RESPONSE" | tail -n1)
          CURSEFORGE_BODY=$(echo "$CURSEFORGE_RESPONSE" | sed '$d')

          if [ "$CURSEFORGE_HTTP_CODE" -eq 200 ] && [ -n "$CURSEFORGE_BODY" ]; then
            CURSEFORGE_TOTAL=$(echo "$CURSEFORGE_BODY" | python3 -c "import sys, json; data = json.load(sys.stdin); print(sum(mod['downloadCount'] for mod in data['data']))" 2>/dev/null || echo "0")
            CURSEFORGE_SUCCESS=true
          else
            echo "Warning: CurseForge API failed (HTTP $CURSEFORGE_HTTP_CODE), using previous value"
            CURSEFORGE_TOTAL=$(jq -r '.curseforge // 0' static/data/downloads.json 2>/dev/null || echo "0")
            CURSEFORGE_SUCCESS=false
          fi

          # Fetch Modrinth downloads with error handling
          MODRINTH_RESPONSE=$(curl -s -w "\n%{http_code}" 'https://api.modrinth.com/v2/user/PEiFMA4y/projects')
          MODRINTH_HTTP_CODE=$(echo "$MODRINTH_RESPONSE" | tail -n1)
          MODRINTH_BODY=$(echo "$MODRINTH_RESPONSE" | sed '$d')

          if [ "$MODRINTH_HTTP_CODE" -eq 200 ] && [ -n "$MODRINTH_BODY" ]; then
            MODRINTH_TOTAL=$(echo "$MODRINTH_BODY" | python3 -c "import sys, json; data = json.load(sys.stdin); print(sum(p['downloads'] for p in data))" 2>/dev/null || echo "0")
          else
            echo "Warning: Modrinth API failed (HTTP $MODRINTH_HTTP_CODE), using CurseForge only"
            MODRINTH_TOTAL=0
          fi

          # Calculate total
          TOTAL=$((MODRINTH_TOTAL + CURSEFORGE_TOTAL))

          # Only update if CurseForge succeeded
          if [ "$CURSEFORGE_SUCCESS" = true ]; then
            # Create JSON file
            mkdir -p static/data
            cat > static/data/downloads.json << EOF
          {
            "modrinth": $MODRINTH_TOTAL,
            "curseforge": $CURSEFORGE_TOTAL,
            "total": $TOTAL,
            "lastUpdated": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF
            echo "Total downloads: $TOTAL (Modrinth: $MODRINTH_TOTAL, CurseForge: $CURSEFORGE_TOTAL)"
          else
            echo "Error: CurseForge API failed, keeping existing data"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data/downloads.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update download counts [skip ci]" && git push)
