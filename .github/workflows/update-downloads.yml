name: Update Download Counts

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-downloads:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch download counts
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: |
          # Fetch CurseForge downloads with pagination handling
          CURSEFORGE_TOTAL=0
          CURSEFORGE_SUCCESS=false
          INDEX=0

          while true; do
            CURSEFORGE_RESPONSE=$(curl -s -w "\n%{http_code}" -H "x-api-key: $CURSEFORGE_API_KEY" \
              "https://api.curseforge.com/v1/mods/search?gameId=432&authorId=103107110&pageSize=50&index=$INDEX")
            CURSEFORGE_HTTP_CODE=$(echo "$CURSEFORGE_RESPONSE" | tail -n1)
            CURSEFORGE_BODY=$(echo "$CURSEFORGE_RESPONSE" | sed '$d')

            if [ "$CURSEFORGE_HTTP_CODE" -eq 200 ] && [ -n "$CURSEFORGE_BODY" ]; then
              PAGE_DOWNLOADS=$(echo "$CURSEFORGE_BODY" | python3 -c "import sys, json; data = json.load(sys.stdin); print(sum(mod['downloadCount'] for mod in data['data']))" 2>/dev/null || echo "0")
              RESULT_COUNT=$(echo "$CURSEFORGE_BODY" | python3 -c "import sys, json; data = json.load(sys.stdin); print(data['pagination']['resultCount'])" 2>/dev/null || echo "0")

              CURSEFORGE_TOTAL=$((CURSEFORGE_TOTAL + PAGE_DOWNLOADS))
              CURSEFORGE_SUCCESS=true

              echo "Fetched page at index $INDEX: $PAGE_DOWNLOADS downloads, $RESULT_COUNT mods"

              # Break if we got fewer results than page size (last page)
              if [ "$RESULT_COUNT" -lt 50 ]; then
                break
              fi

              INDEX=$((INDEX + 50))
            else
              echo "Warning: CurseForge API failed (HTTP $CURSEFORGE_HTTP_CODE) at index $INDEX"
              if [ "$INDEX" -eq 0 ]; then
                # First request failed, use fallback
                CURSEFORGE_TOTAL=$(jq -r '.curseforge // 0' static/data/downloads.json 2>/dev/null || echo "0")
                CURSEFORGE_SUCCESS=false
              fi
              break
            fi
          done

          echo "CurseForge total downloads: $CURSEFORGE_TOTAL"

          # Fetch Modrinth downloads with error handling
          MODRINTH_RESPONSE=$(curl -s -w "\n%{http_code}" 'https://api.modrinth.com/v2/user/PEiFMA4y/projects')
          MODRINTH_HTTP_CODE=$(echo "$MODRINTH_RESPONSE" | tail -n1)
          MODRINTH_BODY=$(echo "$MODRINTH_RESPONSE" | sed '$d')

          if [ "$MODRINTH_HTTP_CODE" -eq 200 ] && [ -n "$MODRINTH_BODY" ]; then
            MODRINTH_TOTAL=$(echo "$MODRINTH_BODY" | python3 -c "import sys, json; data = json.load(sys.stdin); print(sum(p['downloads'] for p in data))" 2>/dev/null || echo "0")
          else
            echo "Warning: Modrinth API failed (HTTP $MODRINTH_HTTP_CODE), using CurseForge only"
            MODRINTH_TOTAL=0
          fi

          # Calculate total
          TOTAL=$((MODRINTH_TOTAL + CURSEFORGE_TOTAL))

          # Only update if CurseForge succeeded
          if [ "$CURSEFORGE_SUCCESS" = true ]; then
            # Create JSON file
            mkdir -p static/data
            cat > static/data/downloads.json << EOF
          {
            "modrinth": $MODRINTH_TOTAL,
            "curseforge": $CURSEFORGE_TOTAL,
            "total": $TOTAL,
            "lastUpdated": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF
            echo "Total downloads: $TOTAL (Modrinth: $MODRINTH_TOTAL, CurseForge: $CURSEFORGE_TOTAL)"
          else
            echo "Error: CurseForge API failed, keeping existing data"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data/downloads.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update download counts [skip ci]" && git pull --rebase && git push)
